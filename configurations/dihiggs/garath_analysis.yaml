{% import 'core.yaml' as core %}

common_histograms: &common_histograms
  - module_name: TopVecHistograms
    prefix: "Jet"
    input_col: goodJet
    max_idx: 6

  - module_name: FourVecHistograms
    input_col: goodJet
    hist_name: Jet
    mass_axis:
      name: "Jet $m$"
      start: 0
      stop: 500
      bins: 50

  - module_name: SimpleHistogram
    hist_name: JetHT
    input_cols: [HT]
    axes:
      - name: HT
        start: 0
        stop: 3000
        bins: 60
        unit: GeV
    
  - module_name: SimpleHistogram
    hist_name: JetN
    input_cols: [NJet]
    axes:
      - name: "$N_{jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
    input_col: MedB
    hist_name: MedB

  - module_name: SimpleHistogram
    hist_name: AK4JetQvG
    input_cols: [Jet.btagUParTAK4QvG]
    axes:
      - name: "AK4Jet UParTQvG Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: SimpleHistogram
    hist_name: AK4Jetbtag
    input_cols: [Jet.btagUParTAK4B]
    axes:
      - name: "AK4Jet UParTB Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: SimpleHistogram
    hist_name: MedBN
    input_cols: [NMedB]
    axes:
      - name: "$N_{b}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: JetComboHistograms
    input_col: MedB
    prefix: "b_dijet"
    jet_combos:
      - [0,1]
    mass_axis:
      name: "b_dijet"
      start: 0
      stop: 500
      bins: 50

  - module_name: FourVecHistograms
    input_col: Jet
    hist_name: AK4Jet
    mass_axis:
      name: "AK4Jet"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: SimpleHistogram
    hist_name: AK4NJet
    input_cols: [NAK4Jet]
    axes: 
      - name: "$N_{AK4Jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: AK4JetID
    input_cols: [Jet.jetId]
    axes:
      - name: "AK4Jet JetID"
        start: -0.5
        stop: 6.5
        bins: 7
  
  - module_name: SimpleHistogram
    hist_name: AK4HT  
    input_cols: [AK4HT]
    axes:
      - name: "AK4Jet $H_{T}$"
        start: 0
        stop: 3000
        bins: 60
        unit: "GeV"

gen_vars: &gen_vars
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: Gen_Higgs
    pdgId: 25
    status_flag: 13

  - module_name: GenPartFilter
    input_col: GenPart
    output_col: GenPart_2b4q
    pdgId: [1, 2, 3, 4, 5]
    status_flag: [12, 7]
    require_ancestor_pdgId: 25

  - module_name: NObjFilter
    input_col: GenPart_2b4q
    selection_name: is_fully_hadronic
    min_count: 6
    max_count: 6

  - module_name: HT
    input_col: GenPart_2b4q
    output_col: GenPartHT

  - module_name: GenPartFilter
    input_col: GenPart_2b4q
    output_col: GenPart_2b
    pdgId: 5
    status_flag: [12, 7]

  - module_name: GenPartFilter
    input_col: GenPart_2b4q
    output_col: GenPart_4q
    pdgId: [1, 2, 3, 4]
    status_flag: [12, 7]

  # First copy quarks with hard process flag
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: GenPart_hardprocess_quarks
    pdgId: [1, 2, 3, 4, 5]
    status_flag: [12, 7]   # isFirstCopy AND isHardProcess

  # First copy quarks without hard process flag
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: GenPart_firstcopy_quarks
    pdgId: [1, 2, 3, 4, 5]
    status_flag: 12        # isFirstCopy only

  - module_name: GenPartFilter
    input_col: GenPart
    output_col: Gen_Ws
    pdgId: 24
    status_flag: 13
  
  - module_name: GenWOrganizer
    input_col: Gen_Ws
    onshell_col: Gen_W_onshell
    offshell_col: Gen_W_offshell

  - module_name: Count
    input_col: GenPart_hardprocess_quarks
    output_col: nhard_first_copy_qs

  - module_name: Count
    input_col: GenPart_firstcopy_quarks
    output_col: nfirst_copy_qs

  - module_name: Count
    input_col: Gen_Higgs
    output_col: nGen_Higgs

  - module_name: GenDiparticleReconstructor
    input_col: GenPart_2b4q
    output_col: Gen_hbb
    daughter_pids: [5]

  - module_name: GenDiparticleReconstructor
    input_col: GenPart_2b4q
    output_col: Gen_hww
    daughter_pids: [1, 2, 3, 4]

  - module_name: GenPartMinDRMaker
    input_col: GenPart_2b4q
    output_col: min_dr_GenPart

  - module_name: GenPartMinDRMaker
    input_col: GenPart_2b
    output_col: min_dr_gen_hbb

  - module_name: GenPartMinDRMaker
    input_col: GenPart_4q
    output_col: min_dr_gen_hww

  - module_name: GenPartMinDRMaker
    input_col: Gen_Ws
    output_col: min_dr_Gen_Ws

  - module_name: GenPartMinDRMaker
    input_col: Gen_Higgs
    output_col: dr_Gen_Higgs

  - module_name: GenBJetMatcher
    genpart_col: GenPart_2b
    genjet_col: GenJet
    output_col: GenBJet
    dr_threshold: 0.4

  - module_name: Count
    input_col: GenBJet
    output_col: n_GenBJet

  - module_name: GenWQuarkMatcher
    w_col: Gen_W_onshell
    genpart_col: GenPart
    quark_col: GenPart_4q
    output_col: dr_qq_onshell

  - module_name: GenWQuarkMatcher
    w_col: Gen_W_offshell
    genpart_col: GenPart
    quark_col: GenPart_4q
    output_col: dr_qq_offshell
  
  - module_name: GenPartMaxDRMaker
    input_col: GenPart_4q
    output_col_4q: max_dr_4q
    output_col_3q: max_dr_3q
    isolation_threshold: 0.8

  - module_name: GenQuarkPairDRTable
    q_col: GenPart_4q
    w_col: Gen_Ws
    genpart_col: GenPart
    b_col: GenPart_2b
    output_col: min_dr_pair_idx
    output_col_dr: min_dr_pair_dr
    mode: min

  - module_name: GenQuarkPairDRTable
    q_col: GenPart_4q
    w_col: Gen_Ws
    genpart_col: GenPart
    output_col: max_dr_pair_idx_4q
    output_col_dr: max_dr_pair_dr_4q
    mode: max

  - module_name: GenQuarkPairDRByIndex
    idx_col: max_dr_pair_idx_4q
    dr_col: max_dr_pair_dr_4q
    output_prefix: max_dr_by_pair
    n_pairs: 6

  - module_name: GenQuarkPairDRByIndex
    idx_col: min_dr_pair_idx
    dr_col: min_dr_pair_dr
    output_prefix: min_dr_by_pair
    n_pairs: 15

  - module_name: GenPartMaxDeltaEtaPhiMaker
    input_col: GenPart_4q
    output_col_deta: max_deta_4q
    output_col_dphi: max_dphi_4q

gen_histograms: &gen_histograms
