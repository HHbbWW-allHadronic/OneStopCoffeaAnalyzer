analyzer:
  default_run_builder:
    strategy_name: NoSystematics
  withHLT_ObjDef1:
    - *withHLT_ObjDef1
    - *common_histograms
    - *gen_histograms

  withHLT_ObjDef2:
    - *withHLT_ObjDef2
    - *common_histograms
    - *gen_histograms

  noHLT_ObjDef1:
    - *noHLT_ObjDef1
    - *common_histograms
    - *gen_histograms

  noHLT_ObjDef2:
    - *noHLT_ObjDef2
    - *common_histograms
    - *gen_histograms

  withHLT_NoSelection:
    - *withHLT_NoSelection
    - *common_histograms
    - *gen_vars
    - *gen_histograms

  NoSelection:
    - *NoSelection
    - *gen_vars
    - *common_histograms
    - *gen_histograms

location_priorities: [".*(T0|T1|T2).*","eos"]

