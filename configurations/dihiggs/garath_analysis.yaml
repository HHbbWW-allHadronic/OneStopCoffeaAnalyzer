    hist_name: Gen_W_onshell
    mass_axis:
      name: "Gen_W_onshell mass"
      start: 0
      stop: 120
      bins: 60
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_W_offshell
    hist_name: Gen_W_offshell
    mass_axis:
      name: "Gen_W_offshell mass"
      start: 0
      stop: 120
      bins: 60
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: GenBJet
    hist_name: GenBJet
    mass_axis:
      name: 'Gen b Jet'
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: SimpleHistogram
    hist_name: min_dr_GenPart
    input_cols: [min_dr_GenPart]
    axes:
      - name: 'genpart min $\Delta R$ HH(2b4q)'
        start: 0.0
        stop: 3.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_gen_hbb
    input_cols: [min_dr_gen_hbb]
    axes:
      - name: 'genpart $\Delta R$ H(2b)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_gen_hww
    input_cols: [min_dr_gen_hww]
    axes:
      - name: 'genpart min $\Delta R$ H(4q)'
        start: 0.0
        stop: 3.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_Gen_Ws
    input_cols: [min_dr_Gen_Ws]
    axes:
      - name: 'genpart $\Delta R$ H(2W)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: dr_qq_onshell
    input_cols: [dr_qq_onshell]
    axes:
      - name: 'genpart $\Delta R$ onshell W(2q)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: dr_qq_offshell
    input_cols: [dr_qq_offshell]
    axes:
      - name: 'genpart $\Delta R$ offshell W(2q)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: dr_Gen_Higgs
    input_cols: [dr_Gen_Higgs]
    axes:
      - name: 'genpart $\Delta R$ HH'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: max_dr_4q
    input_cols: [max_dr_4q]
    axes:
      - name: 'Max $\Delta R$ (4 quarks from W decay)'
        start: 0
        stop: 6
        bins: 60
  
  - module_name: SimpleHistogram
    hist_name: max_dr_3q
    input_cols: [max_dr_3q]
    axes:
      - name: 'Max $\Delta R$ (3 quarks from W decay, most isolated removed)'
