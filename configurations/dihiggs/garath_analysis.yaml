    axes:
      - name: 'Gen Higgs $p_{T}$ [GeV]'
        start: 0
        stop: 500
        bins: 50
      - name: '$\Delta R$ (2b)'
        start: 0
        stop: 6
        bins: 60

    # ===== dr of 2b compared to 6 qq pairs from WW =====         
