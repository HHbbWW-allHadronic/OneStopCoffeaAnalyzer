        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: n_GenBJet
    input_cols: [n_GenBJet]
    axes:
      - name: "num gen b jets"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: nfirst_copy_qs
    input_cols: [nfirst_copy_qs]
    axes:
      - name: "num 1st copy quarks"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
    input_col: Gen_Higgs
    hist_name: Gen_Higgs
    mass_axis:
      name: "Gen_Higgs"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
