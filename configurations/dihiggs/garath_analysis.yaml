        stop: 6
        bins: 60
  
  - module_name: SimpleHistogram
    hist_name: min_dr_pair_idx
    input_cols: [min_dr_pair_idx]
    axes:
      - name: 'Genpart quark pairs that gave the min $\Delta R$'
        start: 0
        stop: 15
        bins: 15
  
  - module_name: SimpleHistogram
    hist_name: max_dr_pair_idx_4q
    input_cols: [max_dr_pair_idx_4q]
    axes:
      - name: 'Genpart quark pairs that give the max $\Delta R$ (4q)'
        start: 0
        stop: 6
        bins: 6

  - module_name: SimpleHistogram
    hist_name: max_deta_4q
    input_cols: [max_deta_4q]
    axes:
      - name: 'Max $|\Delta\eta|$ (4q)'
        start: 0
        stop: 6
        bins: 60

  - module_name: SimpleHistogram
    hist_name: max_dphi_4q
    input_cols: [max_dphi_4q]
    axes:
      - name: 'Max $|\Delta\phi|$ (4q)'
        start: 0
        stop: 3.14159
        bins: 60

  - module_name: SimpleHistogram
    hist_name: 2d_hbb_vs_hww_dr
    input_cols: [min_dr_gen_hbb, max_dr_4q]
    axes:
      - name: '$\Delta R$ (2b)'
        start: 0
        stop: 5
        bins: 50
      - name: 'Max $\Delta R$ (4q)'
        start: 0
        stop: 5
        bins: 50
  
  - module_name: SimpleHistogram
