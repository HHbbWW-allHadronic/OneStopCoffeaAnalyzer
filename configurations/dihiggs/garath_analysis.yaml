        start: 0
        stop: 3000
        bins: 60
        unit: GeV

  - module_name: SimpleHistogram
    hist_name: GenPartHT
    input_cols: [GenPartHT]
    axes:
      - name: "GenPart $H_{T}$"
        start: 0
        stop: 3000
        bins: 60
        unit: GeV

  - module_name: SimpleHistogram
    hist_name: GenNJet
    input_cols: [NGenJet]
    axes:
      - name: "$N_{GenJets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
