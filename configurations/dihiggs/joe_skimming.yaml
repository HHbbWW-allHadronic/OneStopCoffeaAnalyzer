{% import 'core.yaml' as core %}

{%- macro all_pipelines() %}
      - withHLT_ObjDef1
      - withHLT_ObjDef3
{%- endmacro %}

{{ core.objects() }}
{{ core.regions() }}

analyzer:
  default_run_builder:
    strategy_name: NoSystematics

  withHLT_ObjDef1:
    - *withHLT_ObjDef1
    - module_name: JetCombos
      input_cols:
        - MedB
        - nontop2b_med
      jet_combos:
        - [0, 1]
        - [0, 1, 2, 3]
      output_cols:
        - "b_dijet"
        - "nontop2b_fourjet"
    - module_name: SaveEventsH5
      prefix: /uscms_data/d3/jgehrke/skims/2024/withHLT_ObjDef1
      jet_col: goodJet
      jet_vars: [pt, eta, phi, mass, btag]
      n_jets: 6
      event_vars: [HT, b_dijet.mass, nontop2b_fourjet.mass]

  withHLT_ObjDef3:
    - *withHLT_ObjDef3
    - module_name: JetCombos
      input_cols:
        - TightB
        - nontop2b_tight
      jet_combos:
        - [0, 1]
        - [0, 1, 2, 3]
      output_cols:
        - "b_dijet"
        - "nontop2b_fourjet"
    - module_name: SaveEventsH5
      prefix: /uscms_data/d3/jgehrke/skims/2024/withHLT_ObjDef3
      jet_col: goodJet
      jet_vars: [pt, eta, phi, mass, btag]
      n_jets: 6
      event_vars: [HT, b_dijet.mass, nontop2b_fourjet.mass]

location_priorities: [".*(T0|T1|T2).*","eos"]

event_collections:
  - dataset: 'data_HHParking_2024*'
    pipelines:
    {{ all_pipelines() }}
  - dataset: 'ggHH2b2V6q_2024*'
    pipelines: 
    {{ all_pipelines() }}
  - dataset: 'qcd*2024*'
    pipelines:
    {{ all_pipelines() }}
  - dataset: 'tt_hadronic*2024*'
    pipelines:
    {{ all_pipelines() }}
  - dataset: 'tt_semilep*2024'
    pipelines:
    {{ all_pipelines() }}
