Postprocessing:
  processors:
    - name: PlotSelectionFlow
      inputs:
        - "*/*/*/selection"
      scale: log
      normalize: True
      structure:
        select: {type: SelectionFlow}
        group: {era.name: "*", pipeline: "*"}
      output_name: "plots/{era.name}/{pipeline}/cutflow.png"

    - name: Histogram1D
      inputs:
        - "*/*/*/*"
      scale: log
      normalize: False
      show_info: True
      structure:
        select: {dataset_name: "*", name: "re:^(?!selection$|all_triggers$).*"}
        group: {pipeline: "*", era.name: "*", name: "*"}
        subgroups:
          unstacked: {select: {dataset_name: "ggHH2b2V6q*"}}
          stacked: {select: {dataset_name: "!ggHH2b2V6q*"}}
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
          - name: SumHistograms
            sum_match_pattern: {dataset_name: "tt*"}
            new_meta_fields:
              dataset_name: "tt"
              title: "$t\\overline{t}$"
        styles:
          - pattern: {dataset_name: "!gg*"}
            style:
              fill: true
          - pattern: {dataset_name: "gg*"}
            style:
              fill: false
      output_name: "plots/{era.name}/{pipeline}/{name}"

    - name: RatioPlot
      inputs:
        - "*/*/*/b_dijet_12_m"
        - "*/*/*/nontop2b_14_m"
      ratio_type: "significance"
      show_den_unc: False
      scale: linear
      ratio_ylim: null
      ratio_hlines: []
      structure:
        select: {dataset_name: "*", name: "*", pipeline: "*"}
        group: {era.name: "*", name: "*", pipeline: "*"}
        subgroups:
          denominator:
            select: {dataset_name: "!ggHH2b2V6q*"}
          numerator:
            select: {dataset_name: "ggHH2b2V6q*"}
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
      output_name: "plots/{era.name}/{pipeline}/significance_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/*"
      ratio_type: "efficiency"
      ratio_ylim: [0 ,1.1]
      ratio_scale: 1
      show_den_unc: False
      scale: log
      structure:
        select: {dataset_name: "ggHH2b2V6q*", name: "re:^(?!selection$|all_triggers$).*", pipeline: "*NoSelection"}
        group: {era.name: "*", name: "*"}
        subgroups:
          denominator:
            select: {pipeline: NoSelection}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
          numerator:
            select: {pipeline: withHLT_NoSelection}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
          - name: SliceAxes
            slices: {0: [0,1200]}
      output_name: "plots/{era.name}/withHLT_NoSelection/trigger_eff_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/*"
      ratio_type: "efficiency"
      show_den_unc: False
      scale: log
      structure:
        select: {dataset_name: "ggHH2b2V6q*", name: "re:^(?!selection$|all_triggers$).*", pipeline: "*ObjDef2"}
        group: {era.name: "*", name: "*"}
        subgroups:
          denominator:
            select: {pipeline: noHLT_ObjDef2}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
          numerator:
            select: {pipeline: withHLT_ObjDef2}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
          - name: SliceAxes
            slices: {0: [0,1200]}
      output_name: "plots/{era.name}/withHLT_ObjDef2/trigger_eff_{name}.png"

    - name: RatioPlot
      inputs:
        - "*/*/*/*"
      ratio_type: "efficiency"
      show_den_unc: False
      scale: log
      structure:
        select: {dataset_name: "ggHH2b2V6q*", name: "re:^(?!selection$|all_triggers$).*", pipeline: "*ObjDef1"}
        group: {era.name: "*", name: "*"}
        subgroups:
          denominator:
            select: {pipeline: noHLT_ObjDef1}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
          numerator:
            select: {pipeline: withHLT_ObjDef1}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
          - name: SliceAxes
            slices: {0: [0,1200]}
      output_name: "plots/{era.name}/withHLT_ObjDef1/trigger_eff_{name}.png"

    - name: CutflowTable
      output_name: signal_yield
      inputs:
        - "*/*/SignalOnly/all_triggers"
      structure:
        select: {dataset_name: "*", pipeline: "*"}
        group: {era.name: "*", name: "*"}
      output_name: "signal_yields.csv"

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1

