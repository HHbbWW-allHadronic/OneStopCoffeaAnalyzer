Postprocessing:
  processors:
    - name: Histogram1D
      inputs:
        - "*/*/*/*"
      scale: log
      normalize: False 
      structure:
        select: {dataset_name: "*", name: "!selection"}
        group: {pipeline: "withHLT_NoSelection", era.name: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: {"variation": "central"}
      output_name: "plots/{era.name}/{pipeline}/{name}"
    
    - name: Histogram1D
      inputs:
        - "*/*/*/*"
      scale: log
      normalize: False
      structure:
        select: {dataset_name: "*"}
        group: {pipeline: "NoSelection", era.name: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: {"variation": "central"}
      output_name: "plots/{era.name}/{pipeline}/{name}"

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1

