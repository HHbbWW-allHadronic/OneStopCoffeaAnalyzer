  # IMPORTANT: trigger the selection. This will use all the selections defined up until this point
  - module_name: SelectOnColumns
    sel_name: selection


  # Can you reconstruct one of the higgs from the two leading b-jets?
  - module_name: JetComboHistograms
    input_col: MedB
    prefix: "two_b_reco"
    jet_combos:
      - [0,1]

  # General AK4 jet kinematics
  - module_name: TopVecHistograms
    prefix: "jet"
    input_col: GoodJet
    max_idx: 6

  - module_name: SimpleHistogram
    hist_name: HT
    input_cols: [HT]
    axes:
      - name: HT
        start: 0
        stop: 3000
        bins: 60
        unit: GeV
  
  - module_name: SimpleHistogram
    hist_name: njets
    input_cols: [njets]
    axes:
    - name: njets
      start: 0
      stop: 14
      bins: 15


analyzer:
  default_run_builder:
    strategy_name: NoSystematics

  dihiggs_signal_region:
    - *dihiggs_signal_region

  dihiggs_signal_region_NoSelection:
    - *dihiggs_signal_region_NoSelection
    
# location_priorities: [".*FNAL.*", ".*US.*", ".*(DE|IT|CH|FR).*", ".*(T0|T1|T2).*","eos"]
location_priorities: [".*(T0|T1|T2).*","eos"]

event_collections:
  # Data samples
  # Signal Samples
  - dataset: "signal_ggtoHHto2b2V"
    pipelines: [dihiggs_signal_region, dihiggs_signal_region_NoSelection]
  
extra_executors:
  test:
    executor_name: ImmediateExecutor
    chunk_size: 10000

  test2:
    executor_name: LocalDaskExecutor
    chunk_size: 100000
    min_workers: 1
    max_workers: 3
    reduction_factor: 2
  
  testcondor:
    executor_name: LPCCondorDask
    container: /cvmfs/unpacked.cern.ch/registry.hub.docker.com/coffeateam/coffea-dask-almalinux9:2025.10.2-py3.12
    venv_path: .venv
    chunk_size: 80000
    min_workers: 40
    max_workers: 200
    worker_memory: 4GB
    reduction_factor: 5
