  - module_name: UParTBQuarkMaker
    input_col: GoodJet
    output_col: MedB
    working_point: M

  - module_name: HT
    input_col: GoodJet
  
  - module_name: Count
    input_col: GoodJet
    output_col: njets

  # Basic Selection
  # Require Events to have:
  # Zero leptons
  # at least 2 medium b jets
  # At least 6 jets
  - module_name: NObjFilter
    input_col: GoodElectron
    selection_name: zero_electron
    min_count: 0
    max_count: 0

  - module_name: NObjFilter
    input_col: GoodMuon
    selection_name: zero_muon
    min_count: 0
    max_count: 0

  - module_name: NObjFilter
    input_col: GoodJet
    selection_name: njets
